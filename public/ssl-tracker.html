<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSL Website Dev Tracker — Signal Strait Labs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #01081b;
    --bg-card:   #040d24;
    --bg-row:    #060e28;
    --bg-done:   #040d24;
    --blue:      #1a59cc;
    --blue-dim:  #0e3580;
    --blue-glow: rgba(26,89,204,0.18);
    --gold:      #C5A059;
    --gold-dim:  #9A7432;
    --gold-glow: rgba(197,160,89,0.15);
    --white:     #ffffff;
    --text-1:    #e8ecf4;
    --text-2:    #8a97b4;
    --text-3:    #4a5572;
    --border:    rgba(255,255,255,0.07);
    --border-hi: rgba(197,160,89,0.25);
    --green:     #22c55e;
    --green-bg:  rgba(34,197,94,0.12);
    --radius:    10px;
    --radius-lg: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 0;
  }

  /* ─── Header ─── */
  .site-header {
    background: linear-gradient(135deg, #01081B 0%, #051336 50%, #1C1A14 85%, #423721 100%);
    border-bottom: 1px solid var(--border-hi);
    padding: 28px 32px 24px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-dot { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, #1a59cc, #C5A059); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; letter-spacing: -0.5px; flex-shrink: 0; }
  .brand-label { display: flex; flex-direction: column; }
  .brand-name { font-size: 15px; font-weight: 600; color: var(--white); letter-spacing: -0.2px; }
  .brand-sub { font-size: 11px; color: var(--text-2); letter-spacing: 0.05em; text-transform: uppercase; }
  .header-right { text-align: right; }
  .progress-big { font-size: 28px; font-weight: 700; color: var(--white); line-height: 1; }
  .progress-big span { font-size: 14px; font-weight: 400; color: var(--text-2); }
  .progress-pct { font-size: 12px; color: var(--gold); margin-top: 2px; }

  /* ─── Progress Bar ─── */
  .progress-bar-wrap { max-width: 900px; margin: 0 auto; padding: 14px 32px 0; }
  .progress-track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; }
  .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #1a59cc, #C5A059); transition: width 0.4s ease; }

  /* ─── Body ─── */
  .body-wrap { max-width: 900px; margin: 0 auto; padding: 24px 32px 60px; }

  /* ─── Filter Bar ─── */
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px; }
  .filter-btn {
    font-size: 12px; padding: 5px 14px; border-radius: 20px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-2);
    transition: all 0.15s; font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .filter-btn.active { background: rgba(26,89,204,0.2); border-color: var(--blue); color: #7aacff; }
  .spacer { flex: 1; }
  .util-btn {
    font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text-3);
    transition: all 0.15s; font-family: inherit;
  }
  .util-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text-2); }

  /* ─── Phase Card ─── */
  .phase { margin-bottom: 10px; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.2s; }
  .phase:hover { border-color: rgba(197,160,89,0.2); }
  .phase.all-done { border-color: rgba(34,197,94,0.2); }

  .phase-header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; cursor: pointer; user-select: none;
    background: linear-gradient(135deg, #040d24 0%, #060e28 100%);
    transition: background 0.15s;
  }
  .phase-header:hover { background: linear-gradient(135deg, #060e28 0%, #07102e 100%); }

  .phase-badge {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    border: 1px solid rgba(26,89,204,0.3); background: rgba(26,89,204,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #7aacff; letter-spacing: -0.5px;
  }
  .phase-badge.done { background: var(--green-bg); border-color: rgba(34,197,94,0.3); color: var(--green); }

  .phase-info { flex: 1; min-width: 0; }
  .phase-title-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .phase-title { font-size: 13.5px; font-weight: 600; color: var(--text-1); }
  .phase-day { font-size: 11px; color: var(--text-3); }

  .phase-progress-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .mini-track { flex: 1; height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; }
  .mini-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .mini-count { font-size: 11px; color: var(--text-3); flex-shrink: 0; min-width: 32px; text-align: right; }

  .chevron {
    width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: var(--text-2);
  }
  .phase-header:hover .chevron { background: rgba(197,160,89,0.1); border-color: rgba(197,160,89,0.3); color: var(--gold); }
  .chevron svg { transition: transform 0.25s; width: 13px; height: 13px; }
  .chevron.open svg { transform: rotate(180deg); }

  /* ─── Context Strip ─── */
  .phase-context {
    padding: 10px 18px; font-size: 12px; color: var(--text-2);
    background: rgba(26,89,204,0.05); border-bottom: 1px solid var(--border);
    border-left: 2px solid var(--blue-dim); line-height: 1.6;
  }

  /* ─── Task Rows ─── */
  .task-list { }
  .task-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 18px; cursor: pointer;
    border-top: 1px solid rgba(255,255,255,0.04);
    background: rgba(4,13,36,0.5);
    transition: background 0.12s;
  }
  .task-row:hover { background: rgba(26,89,204,0.06); }
  .task-row.completed { background: rgba(4,13,36,0.3); }

  /* ─── CHECKBOX ─── */
  .checkbox {
    width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; margin-top: 1px;
    border: 1.5px solid rgba(197,160,89,0.4);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .task-row:hover .checkbox { border-color: var(--gold); }
  .checkbox.checked {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-color: #22c55e;
  }
  .checkbox svg { display: none; width: 11px; height: 11px; }
  .checkbox.checked svg { display: block; }

  .task-text {
    flex: 1; font-size: 12.5px; color: var(--text-1); line-height: 1.55;
    transition: color 0.15s;
  }
  .task-row.completed .task-text { color: var(--text-3); text-decoration: line-through; }

  .tag {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
    flex-shrink: 0; margin-top: 2px; letter-spacing: 0.03em; text-transform: uppercase;
  }

  /* ─── Empty state ─── */
  .empty-phase { padding: 14px 18px; font-size: 12px; color: var(--text-3); text-align: center; font-style: italic; }

  /* ─── Footer ─── */
  .tracker-footer { text-align: center; margin-top: 24px; font-size: 11px; color: var(--text-3); }
  .tracker-footer a { color: var(--gold-dim); text-decoration: none; }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(197,160,89,0.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(197,160,89,0.4); }
</style>
</head>

const BIN_ID  = '6a1a93d021f9ee59d29cff9d';
const API_KEY = '$2a$10$2Ul.rdihxlI./c2POrriMOy3q4lq5hyMeQRYqPm0jXeUr.5sMKJvS';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let completed = {};
let expanded = { P0: true };
let filter = 'all';
let saveTimer = null;

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const states = {
    saving:  { text: '↑ Saving…',   color: '#C5A059' },
    saved:   { text: '✓ Synced',     color: '#22c55e' },
    loading: { text: '↓ Loading…',  color: '#7aacff' },
    error:   { text: '✗ Sync error', color: '#f87171' },
  };
  const s = states[state] || states.saved;
  el.textContent = s.text;
  el.style.color = s.color;
}

async function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncStatus('saving');
    try {
      await fetch(BIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Access-Key': API_KEY },
        body: JSON.stringify({ completed, expanded })
      });
      setSyncStatus('saved');
    } catch(e) {
      setSyncStatus('error');
    }
  }, 600);
}

async function load() {
  setSyncStatus('loading');
  try {
    const res = await fetch(`${BIN_URL}/latest`, {
      headers: { 'X-Access-Key': API_KEY }
    });
    const data = await res.json();
    const record = data.record || {};
    completed = record.completed || {};
    expanded  = record.expanded  || { P0: true };
    setSyncStatus('saved');
  } catch(e) {
    setSyncStatus('error');
  }
}

function allTasks() { return PHASES.flatMap(p => p.tasks); }

function updateHeader() {
  const all = allTasks();
  const done = all.filter(t => completed[t.id]).length;
  const total = all.length;
  const pct = Math.round(done / total * 100);
  document.getElementById('hdr-count').innerHTML = `${done}<span>/${total}</span>`;
  document.getElementById('hdr-pct').textContent = `${pct}% complete`;
  document.getElementById('main-bar').style.width = pct + '%';
  const filterCounts = { all: total, pending: total - done, done };
  ['all','pending','done'].forEach(f => {
    const btn = document.getElementById('fb-' + f);
    const labels = {all:`All (${filterCounts.all})`, pending:`Pending (${filterCounts.pending})`, done:`Done (${filterCounts.done})`};
    btn.textContent = labels[f];
    btn.classList.toggle('active', filter === f);
  });
}

function renderPhases() {
  const container = document.getElementById('phases-list');
  container.innerHTML = '';
  PHASES.forEach(phase => {
    const pDone = phase.tasks.filter(t => completed[t.id]).length;
    const allDone = pDone === phase.tasks.length;
    const pPct = Math.round(pDone / phase.tasks.length * 100);
    const isExp = !!expanded[phase.id];

    const visible = phase.tasks.filter(t => {
      if (filter === 'done') return completed[t.id];
      if (filter === 'pending') return !completed[t.id];
      return true;
    });
    if (visible.length === 0 && filter !== 'all') return;

    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase' + (allDone ? ' all-done' : '');
    phaseEl.id = 'phase-' + phase.id;

    const fillColor = allDone ? '#22c55e' : pPct > 0 ? '#1a59cc' : 'rgba(255,255,255,0.1)';

    phaseEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <div class="phase-badge${allDone ? ' done' : ''}">
          ${allDone
            ? `<svg viewBox="0 0 14 14" fill="none" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5.5,11 12,3"/></svg>`
            : phase.label
          }
        </div>
        <div class="phase-info">
          <div class="phase-title-row">
            <span class="phase-title">${phase.label}: ${phase.title}</span>
            <span class="phase-day">${phase.day}</span>
          </div>
          <div class="phase-progress-row">
            <div class="mini-track"><div class="mini-fill" style="width:${pPct}%;background:${fillColor}"></div></div>
            <span class="mini-count">${pDone}/${phase.tasks.length}</span>
          </div>
        </div>
        <div class="chevron${isExp ? ' open' : ''}">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,4.5 7,9.5 12,4.5"/>
          </svg>
        </div>
      </div>
    `;

    if (isExp) {
      const ctx = document.createElement('div');
      ctx.className = 'phase-context';
      ctx.textContent = phase.context;
      phaseEl.appendChild(ctx);

      const list = document.createElement('div');
      list.className = 'task-list';

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty-phase">No tasks match this filter in this phase.</div>`;
      } else {
        visible.forEach(task => {
          const isDone = !!completed[task.id];
          const ts = TAG_STYLES[task.tag] || {bg:'rgba(255,255,255,0.06)',color:'#8a97b4'};
          const row = document.createElement('div');
          row.className = 'task-row' + (isDone ? ' completed' : '');
          row.setAttribute('data-id', task.id);
          row.setAttribute('role', 'checkbox');
          row.setAttribute('aria-checked', isDone ? 'true' : 'false');
          row.setAttribute('tabindex', '0');
          row.innerHTML = `
            <div class="checkbox${isDone ? ' checked' : ''}">
              <svg viewBox="0 0 11 11" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1.5,6 4,9 9.5,2"/>
              </svg>
            </div>
            <span class="task-text">${task.text}</span>
            <span class="tag" style="background:${ts.bg};color:${ts.color}">${task.tag}</span>
          `;
          row.addEventListener('click', () => toggleTask(task.id));
          row.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleTask(task.id); } });
          list.appendChild(row);
        });
      }
      phaseEl.appendChild(list);
    }

    container.appendChild(phaseEl);
  });

  updateHeader();
}

window.toggleTask = function(id) {
  completed[id] = !completed[id];
  save();
  renderPhases();
};
window.togglePhase = function(id) {
  expanded[id] = !expanded[id];
  save();
  renderPhases();
};
window.setFilter = function(f) {
  filter = f;
  renderPhases();
};
window.expandAll = function() {
  PHASES.forEach(p => expanded[p.id] = true);
  save();
  renderPhases();
};
window.collapseAll = function() {
  PHASES.forEach(p => expanded[p.id] = false);
  save();
  renderPhases();
};

load().then(() => renderPhases());
</script>
